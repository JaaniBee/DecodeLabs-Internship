<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie Recommender</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Movie Recommender</h1>
            <p>Select your favorite genres below to find your perfect movie match.</p>
        </header>

        <main>
            <section class="genre-section">
                <h2>Available Genres</h2>
                <div id="genre-container" class="genre-container">
                    <!-- Genres will be populated here by JS -->
                </div>
            </section>

            <section class="results-section">
                <h2>Top Recommendations</h2>
                <div id="results-container" class="results-container">
                    <div class="placeholder">Select genres to see recommendations!</div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
